name: chapsmart
description: Bitcoin ↔ Mobile Money for Tanzania
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.1.0
  qr_flutter: ^4.1.0

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.6
  firebase_core: ^4.5.0
  firebase_app_check: ^0.4.1+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - .env
